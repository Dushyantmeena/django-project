<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Story Learning creater</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-from: #0f0c29;
      --bg-mid:  #302b63;
      --bg-to:   #24243e;
      --card-bg: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.12);
      --accent: #a78bfa;
      --accent2: #60a5fa;
      --accent-glow: rgba(167,139,250,0.35);
      --text: #f1f0ff;
      --muted: rgba(241,240,255,0.55);
      --input-bg: rgba(255,255,255,0.08);
      --radius: 20px;
      --radius-sm: 12px;
    }

    html, body {
      min-height: 100%;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg-from), var(--bg-mid), var(--bg-to));
      background-attachment: fixed;
    }

    /* ── Animated starfield ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,.25) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 50% 70%, rgba(255,255,255,.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 55%, rgba(255,255,255,.18) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 90%, rgba(255,255,255,.22) 0%, transparent 100%);
      pointer-events: none;
    }

    /* ── Glow orbs ── */
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: .45;
      pointer-events: none; z-index: 0;
    }
    .orb-1 { width:420px; height:420px; background:#6d28d9; top:-120px; left:-100px; animation: drift 12s ease-in-out infinite alternate; }
    .orb-2 { width:340px; height:340px; background:#1d4ed8; bottom:-80px; right:-80px; animation: drift 16s ease-in-out infinite alternate-reverse; }
    .orb-3 { width:200px; height:200px; background:#7c3aed; top:40%; right:10%; animation: drift 10s ease-in-out infinite alternate; }

    @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,25px) scale(1.08); } }

    /* ── Page wrapper ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 16px;
    }

    /* ── Main card ── */
    .card {
      width: 100%; max-width: 520px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 44px 40px 40px;
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.07) inset,
        0 32px 80px rgba(0,0,0,.5),
        0 0 60px rgba(109,40,217,.15);
      animation: slideUp .7s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 36px; }

    .logo-ring {
      display: inline-flex; align-items: center; justify-content: center;
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      box-shadow: 0 0 0 8px rgba(124,58,237,.18), 0 8px 32px rgba(124,58,237,.4);
      margin-bottom: 20px;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 8px rgba(124,58,237,.18),0 8px 32px rgba(124,58,237,.4)} 50%{box-shadow:0 0 0 14px rgba(124,58,237,.08),0 8px 48px rgba(124,58,237,.55)} }

    .logo-ring svg { width: 34px; height: 34px; }

    .badge {
      display: inline-block;
      background: linear-gradient(90deg, rgba(167,139,250,.2), rgba(96,165,250,.2));
      border: 1px solid rgba(167,139,250,.3);
      border-radius: 99px;
      padding: 4px 14px;
      font-size: 11px; font-family: 'Sora', sans-serif; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    h1 {
      font-family: 'Sora', sans-serif;
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 800;
      line-height: 1.15;
      background: linear-gradient(110deg, #e0d7ff 30%, #93c5fd 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 14px; font-weight: 300;
      color: var(--muted); line-height: 1.6;
    }

    /* ── Form section ── */
    .field-label {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; font-weight: 500; font-family: 'Sora', sans-serif;
      letter-spacing: .05em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 10px;
    }
    .field-label svg { opacity: .8; }

    .input-wrap { position: relative; margin-bottom: 22px; }

    input[type="text"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 400;
      padding: 14px 48px 14px 18px;
      outline: none;
      transition: border-color .25s, box-shadow .25s, background .25s;
    }
    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus {
      border-color: var(--accent);
      background: rgba(167,139,250,.08);
      box-shadow: 0 0 0 3px rgba(167,139,250,.18);
    }

    .input-icon {
      position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }

    /* ── Generate button ── */
    .btn {
      width: 100%;
      background: linear-gradient(135deg, #7c3aed 0%, #2563eb 100%);
      color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 700;
      letter-spacing: .03em;
      padding: 15px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      position: relative; overflow: hidden;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 6px 30px rgba(124,58,237,.45);
    }
    .btn::before {
      content:''; position: absolute; inset:0;
      background: linear-gradient(135deg, rgba(255,255,255,.18) 0%, transparent 60%);
      opacity: 0; transition: opacity .25s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(124,58,237,.6); }
    .btn:hover::before { opacity: 1; }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    /* spinner */
    .spinner {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      animation: spin .7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn.loading .spinner { display: block; }
    .btn.loading .btn-label { opacity: .7; }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 14px;
      margin: 28px 0;
      color: var(--muted); font-size: 12px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content:''; flex:1; height:1px;
      background: linear-gradient(90deg, transparent, var(--card-border), transparent);
    }

    /* ── Story output ── */
    .story-section { display: none; animation: fadeIn .5s ease both; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

    .story-box {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-sm);
      padding: 20px;
      min-height: 120px;
      max-height: 260px;
      overflow-y: auto;
      font-size: 14.5px; line-height: 1.8;
      color: rgba(241,240,255,.88);
      font-weight: 300;
      scrollbar-width: thin; scrollbar-color: rgba(167,139,250,.3) transparent;
    }
    .story-box::-webkit-scrollbar { width: 4px; }
    .story-box::-webkit-scrollbar-thumb { background: rgba(167,139,250,.3); border-radius: 99px; }

    /* ── Audio player ── */
    .audio-section {
      display: none;
      margin-top: 18px;
      animation: fadeIn .5s ease both;
    }

    .audio-card {
      background: rgba(167,139,250,.08);
      border: 1px solid rgba(167,139,250,.2);
      border-radius: var(--radius-sm);
      padding: 18px 20px;
    }

    .audio-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 11.5px; font-weight: 600; font-family: 'Sora', sans-serif;
      letter-spacing: .07em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 12px;
    }

    audio {
      width: 100%; height: 38px;
      border-radius: 8px;
      accent-color: var(--accent);
      filter: brightness(1.1);
    }
    audio::-webkit-media-controls-panel { background: rgba(109,40,217,.25); border-radius: 8px; }

    /* ── Error toast ── */
    .error-toast {
      display: none;
      margin-top: 14px;
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 13px; color: #fca5a5;
      display: none; align-items: center; gap: 9px;
      animation: fadeIn .3s ease both;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 28px;
      text-align: center;
      font-size: 12px; color: var(--muted);
      line-height: 1.7;
    }
    .footer span { color: var(--accent); font-weight: 500; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card { padding: 32px 24px 28px; }
    }
  </style>
</head>
<body>

<!-- Atmosphere -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="page">
  <div class="card">

    <!-- Header -->
    <div class="header">
      <div class="logo-ring">
        <!-- Book + sparkle icon -->
        <svg viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 7C6 5.9 6.9 5 8 5H18C19.1 5 20 5.9 20 7V27L13 23L6 27V7Z" fill="white" fill-opacity=".95"/>
          <path d="M20 7C20 5.9 20.9 5 22 5H26C27.1 5 28 5.9 28 7V27L20 23V7Z" fill="white" fill-opacity=".6"/>
          <circle cx="26" cy="9" r="2" fill="#a78bfa"/>
          <path d="M26 5V7M24.27 6.27L25.68 7.68M23.5 9H25.5M24.27 11.73L25.68 10.32M26 13V11" stroke="#c4b5fd" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="badge">✦ AI-Powered Learning</div>
      <h1>AI Story Maker</h1>
      <p class="subtitle">Turn any topic into an immersive story — and listen to it come alive.</p>
    </div>

    <!-- Input -->
    <div class="field-label">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      Enter a Topic
    </div>
    <div class="input-wrap">
      <input type="text" id="topicInput" placeholder="e.g. Photosynthesis, Black Holes, the French Revolution…" autocomplete="off"/>
      <span class="input-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
    </div>

    <button class="btn" id="generateBtn" onclick="generateStory()">
      <span class="spinner" id="spinner"></span>
      <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      <span class="btn-label">Generate Story</span>
    </button>

    <!-- Error -->
    <div class="error-toast" id="errorToast">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="errorMsg">Something went wrong. Please try again.</span>
    </div>

    <!-- Story output -->
    <div class="divider" id="divider" style="display:none">Generated Story</div>

    <div class="story-section" id="storySection">
      <div class="field-label">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
        Your Story
      </div>
      <div class="story-box" id="storyBox"></div>
    </div>

    <!-- Audio player -->
    <div class="audio-section" id="audioSection">
      <div class="audio-card">
        <div class="audio-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
          Listen to the Story
        </div>
        <audio id="audioPlayer" controls></audio>
      </div>
    </div>

  </div>

  <div class="footer">
    Powered by <span>Generative AI</span> · Stories crafted just for you

  </div>

<!-- 👇 YE ADD KAR -->
<img id="storyImage" style="width:100%; margin-top:15px; border-radius:12px; display:none;">
</div>

<script>
  function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
      const cookies = document.cookie.split(';');
      for (let i = 0; i < cookies.length; i++) {
        const cookie = cookies[i].trim();
        if (cookie.substring(0, name.length + 1) === (name + '=')) {
          cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
          break;
        }
      }
    }
    return cookieValue;
  }

  async function generateStory() {
    const topic = document.getElementById('topicInput').value.trim();
    const btn   = document.getElementById('generateBtn');
    const spinner = document.getElementById('spinner');
    const btnIcon = btn.querySelector('.btn-icon');
    const errorToast  = document.getElementById('errorToast');

    // Reset error
    errorToast.style.display = 'none';

    if (!topic) {
      showError('Please enter a topic before generating.');
      document.getElementById('topicInput').focus();
      return;
    }

    // Loading state
    btn.classList.add('loading');
    btn.disabled = true;
    spinner.style.display = 'block';
    btnIcon.style.display = 'none';

    try {
      const res = await fetch('/generate/', {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'X-CSRFToken': getCookie('csrftoken')
        },
        body: JSON.stringify({ topic })
      });

      if (!res.ok) {
        const errorData = await res.json();
        throw new Error(errorData.error || `Server returned ${res.status}`);
      }

      const data = await res.json();

      // ✅ DATA SAVE (IMPORTANT)
      localStorage.setItem("story", JSON.stringify(data.story));
      localStorage.setItem("audio", data.audio);
      localStorage.setItem("image", data.image);
      localStorage.setItem("topic", topic);

      // ✅ REDIRECT TO NEXT PAGE
      window.location.href = "/story/";

    } catch (err) {
      console.error(err);
      showError(err.message);
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
      spinner.style.display = 'none';
      btnIcon.style.display = 'block';
    }
  }

  function showError(msg) {
    const toast = document.getElementById('errorToast');
    document.getElementById('errorMsg').textContent = msg;
    toast.style.display = 'flex';
  }

  // Enter key support
  document.getElementById('topicInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') generateStory();
  });
</script>

  <form style="display:none"><input type="hidden" name="csrfmiddlewaretoken" value="{% csrf_token %}"/></form>
</body>
</html>
